[lint]
ignore = ["implicit_assignment", "duplicated_arguments"]
exclude = ["data-raw/"]
extend-select = ["TESTTHAT", "DPLYR", "pipe_consistency", "unnecessary_nesting", "nzchar", "quotes", "fixed_regex"]
check-roxygen = true
fix-roxygen = true

[lint.assignment]
operator = "<-"

[lint.quotes]
quote = "double"
