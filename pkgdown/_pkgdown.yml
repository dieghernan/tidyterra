home:
  title: >
    tidyterra | methods from tidyverse packages and ggplot2 helpers for Spat* objects

# Reference index convention:
# - Use `has_concept("<family>")` when a section maps to a roxygen `@family`.
# - Keep concept names aligned with `man/roxygen/meta.R`.
# - Use direct selectors only for pages without a family concept.
reference:
- title: "**tibble** methods"
  desc: >
    Methods from [**tibble**](https://CRAN.R-project.org/package=tibble)
    implemented for `Spat*` objects.
- contents:
  - has_concept("tibble.methods")

- title: "**dplyr** methods"
  desc: >
    Methods from [**dplyr**](https://CRAN.R-project.org/package=dplyr) implemented
    for `Spat*` objects.
- subtitle: Rows
  desc: |
    Verbs that mainly operate on rows.
- contents:
  - has_concept("dplyr.rows")
- subtitle: Columns
  desc: |
    Verbs that mainly operate on columns.
- contents:
  - has_concept("dplyr.cols")
- subtitle: Groups
  desc: |
    Verbs that mainly operate on groups of rows.
- contents:
  - has_concept("dplyr.groups")
- subtitle: "`SpatVector` and data frames"
  desc: >
    Verbs that mainly operate on pairs of `SpatVector` objects and data frames.
- contents:
  - has_concept("dplyr.pairs")

- title: "**tidyr** methods"
  desc: >
    Methods from [**tidyr**](https://CRAN.R-project.org/package=tidyr) implemented
    for `Spat*` objects.
- subtitle: Pivoting
  desc: >
    Pivoting methods for changing the representation of `SpatVector` objects
    without changing their geometries.
- contents:
  - has_concept("tidyr.pivot")
- subtitle: Rows
  desc: >
    Tools for duplicating `SpatVector` geometries.
- contents:
  - has_concept("tidyr.rows")
- subtitle: Missing values
  desc: >
    Tools for converting between implicit (absent rows) and explicit (`NA`)
    missing values and for handling explicit `NA` values.
- contents:
  - has_concept("tidyr.missing")
- subtitle: Character vectors
  desc: >
    Tools for working with character layers and attributes.
- contents:
  - has_concept("tidyr.character")
- subtitle: Nesting
  desc: >
    Tools for storing `SpatVector` objects in list-columns.
- contents:
  - has_concept("tidyr.nest")

- title: "**ggplot2** methods"
  desc: >
    Methods from [**ggplot2**](https://CRAN.R-project.org/package=ggplot2)
    implemented for `Spat*` objects.
- contents:
  - has_concept("ggplot2.methods")

- title: "**ggplot2** helpers"
- subtitle: Geoms and helpers
  desc: >
    Helpers for creating **ggplot2**
    layers from `Spat*` objects.
- contents:
  - has_concept("ggplot2.utils")
- subtitle: Scales
  desc: >
    Color scales, palettes and hypsometric tints for spatial plots.
- contents:
  - has_concept("gradients")

- title: "**generics** methods"
  desc: >
    Methods from [**generics**](https://CRAN.R-project.org/package=generics)
    implemented for `Spat*` objects.
- contents:
  - has_concept("generics.methods")

- title: Helpers
  desc: >
    Additional helper functions provided by
    **tidyterra**.
- subtitle: Coercing objects
  desc: >
    Convert `Spat*` objects to other object types or create `SpatRaster` objects
    from tibbles.
- contents:
  - has_concept("coerce")
- subtitle: Other helpers
  desc: >
    Utilities for CRS handling, package checks and `SpatRaster` comparisons.
- contents:
  - has_concept("helpers")

- title: Built-in data
  desc: >
    Example data and palette databases included with **tidyterra**.
- contents:
  - has_concept("datasets")

- title: About the package
- contents:
  - tidyterra-package

